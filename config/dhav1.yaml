robot_name: dhav1
mesh_dir: "src/dhav1/meshes"
base:
  name: base_link
  geoms:
    mesh: "package://dhav1/meshes/base.STL"
    box: {size: "0.3762 0.0935 0.114"}
    cylinder: {radius: "0.1", length: "0.3"}
  pos: "0 0 0.5"
  quat: "1 0 0 0"
  inertial:
    origin: {xyz: 0.05834 -0.00297 0.00191, rpy: "0 0 0"}
    mass: 8.1318585
    inertia: {ixx: 0.0411230, ixy: 0.0003980, ixz: -0.0056608, iyy: 0.1816236, iyz: 0.0000932, izz: 0.2001847}
  visual:
    origin: {xyz: "0 0 0", rpy: "0 0 0"}
    geometry: {type: mesh}
    material: {name: "gray"}
  collision:
    origin: {xyz: "0 0 0", rpy: "0 0 0"}
    geometry: {type: box}
imu: 
  name: imu_link
  joint_name: base_to_imu
  origin: {xyz: "0 0 0", rpy: "0 0 0"}
limbs:
  - prefix: FL
    attach_to: base_link
    chain:
      - suffix: hip
        geoms:
          mesh:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            filename: "package://dhav1/meshes/FL_hip_link.STL"
          cylinder:
            origin: {xyz: "0.06 0.01 0", rpy: "1.57 0 0"}
            length: "0.05"
            radius: "0.046"
        link:
          suffix: link
          inertial:
            origin: {xyz: "0.04383 0.00482 0", rpy: "0 0 0"}
            mass: 0.8530058
            inertia: {ixx: 0.0006434, ixy: 0.0000141, ixz: -0.0000091, iyy: 0.0009809, iyz: 0.0000006, izz: 0.0008005}
          visual:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            geometry: {type: mesh}
            material: {name: "gray"}
          collision:
            origin: {xyz: "0.06 0.01 0", rpy: "1.57 0 0"}
            geometry: {type: cylinder}
            # geometry: {type: mesh}
        joint:
          suffix: joint
          type: revolute
          origin: {xyz: "0.18849 0.0535 0", rpy: "0 0 0"}
          axis: {xyz: "1 0 0"}
          limit: {lower: -1.04, upper: 1.04, effort: 23.7, velocity: 30}

      # THIGH LINK
      - suffix: thigh
        geoms:
          mesh:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            filename: "package://dhav1/meshes/FL_thigh_link.STL"
          box:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            size: "0.213 0.0245 0.034"
        link:
          suffix: link
          inertial:
            origin: {xyz: "-0.00587 0.03519 -0.06239", rpy: "0 0 0"}
            mass: 1.3495061
            inertia: {ixx: 0.0078842, ixy: 0.0000191, ixz: -0.0002683, iyy: 0.0080663, iyz: 0.0007170, izz: 0.0009505}
          visual:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            geometry: {type: mesh}
            material: {name: "gray"}
          collision:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            geometry: {type: box}
            # geometry: {type: mesh}
        joint:
          suffix: joint
          type: revolute
          origin: {xyz: "0.060 0.04825 0", rpy: "0 0 0"}
          axis: {xyz: "0 1 0"}
          limit: {lower: -1.5236, upper: 3.4907, effort: 23.7, velocity: 30}
      
      # CLAF/SHANK LINK
      - suffix: calf
        geoms:
          mesh:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            filename: "package://dhav1/meshes/FL_shank_link.STL"
          cylinder:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            radius: "0.012"
            length: "0.12"
        link:
          suffix: link
          inertial:
            origin: {xyz: "0.01889 0 -0.10829", rpy: "0 0 0"}
            mass: 0.2189873
            inertia: {ixx: 0.0018074, ixy: 0, ixz: 0.0002523, iyy: 0.0018783, iyz: 0, izz: 0.0000924}
          visual:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            geometry: {type: mesh}
            material: {name: "gray"}
          collision:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            geometry: {type: cylinder}
            # geometry: {type: mesh}
        joint:
          suffix: joint
          type: revolute
          origin: {xyz: "0.00004 0.0445 -0.25", rpy: "0 0 0"}
          axis: {xyz: "0 1 0"}
          limit: {lower: -2.7227, upper: -0.83776, effort: 45.43, velocity: 10}
      - suffix: foot
        geoms:
          mesh:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            filename: "package://dhav1/meshes/foot_FL.STL"
          sphere:
            origin: {xyz: "0.01 0 0.02", rpy: "0 0 0"}
            radius: 0.02
        link:
          suffix: ""
          inertial:
            origin: {xyz: "0.01242 0 0.0202", rpy: "0 0 0"}
            mass: 0.0700242
            inertia: {ixx: 0.0000202, ixy: 0, ixz: 0.0000024, iyy: 0.0000211, iyz: 0, izz: 0.0000226}
          visual:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            geometry: {type: mesh}
            material: {name: "gray"}
          collision:
            origin: {xyz: "0 0 0", rpy: "0 0 0"}
            geometry: {type: sphere}
            # geometry: {type: mesh}
        joint:
          suffix: "joint"
          type: "fixed"
          origin: {xyz: "-0.00004 0 -0.27889", rpy: "0 0 0"}
          axis: {xyz: "0 0 0"}
          limit: {lower: 0, upper: 0, effort: 1000, velocity: 0}
# For MJCF-specific
options:
  timestep: 0.002
  gravity: "0 0 -9.81"
