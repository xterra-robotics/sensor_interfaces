robot_name: m2_metal
base:
  name: torso
  inertial:
    origin: {xyz: "0 0 0", rpy: "0 0 0"}
    mass: 12.0  # Example
    inertia: {ixx: 0.15, ixy: 0.0, ixz: 0.0, iyy: 0.15, iyz: 0.0, izz: 0.15}
  visual:
    origin: {xyz: "0 0 0", rpy: "0 0 0"}
    geometry: {box: {size: "0.4 0.3 0.1"}}
    material: {name: "metal"}
  collision:
    origin: {xyz: "0 0 0", rpy: "0 0 0"}
    geometry: {box: {size: "0.4 0.3 0.1"}}
imu: 
  name: imu_link
  joint_name: base_to_imu
  origin: {xyz: "0 0 0", rpy: "0 0 0"}
legs:
  - prefix: FL
    links:
      - suffix: hip
        inertial: {origin: {xyz: "0 0 0", rpy: "0 0 0"}, mass: 1.2, inertia: {ixx: 0.012, ixy: 0, ixz: 0, iyy: 0.012, iyz: 0, izz: 0.012}}
        visual: {origin: {xyz: "0 0 0", rpy: "0 0 0"}, geometry: {type: box, box: {size: "0.1 0.05 0.05"}}, material: {name: "metal"}}
        collision: {origin: {xyz: "0 0 0", rpy: "0 0 0"}, geometry: {type: box, box: {size: "0.1 0.05 0.05"}}}
      - suffix: thigh
        inertial: {origin: {xyz: "0 0 -0.1", rpy: "0 0 0"}, mass: 2.2, inertia: {ixx: 0.022, ixy: 0, ixz: 0, iyy: 0.022, iyz: 0, izz: 0.022}}
        visual: {origin: {xyz: "0 0 -0.1", rpy: "0 0 0"}, geometry: {type: cylinder, cylinder: {length: 0.25, radius: 0.04}}, material: {name: "metal"}}
        collision: {origin: {xyz: "0 0 -0.1", rpy: "0 0 0"}, geometry: {type: cylinder, cylinder: {length: 0.25, radius: 0.04}}}
      - suffix: calf
        inertial: {origin: {xyz: "0 0 -0.12", rpy: "0 0 0"}, mass: 1.8, inertia: {ixx: 0.018, ixy: 0, ixz: 0, iyy: 0.018, iyz: 0, izz: 0.018}}
        visual: {origin: {xyz: "0 0 -0.12", rpy: "0 0 0"}, geometry: {type: cylinder, cylinder: {length: 0.25, radius: 0.04}}, material: {name: "metal"}}
        collision: {origin: {xyz: "0 0 -0.12", rpy: "0 0 0"}, geometry: {type: cylinder, cylinder: {length: 0.25, radius: 0.04}}}
    joints:
      - suffix: hip_joint
        type: revolute
        origin: {xyz: "0.2 0.1 0", rpy: "0 0 0"}
        axis: {xyz: "1 0 0"}
        limit: {lower: -0.8, upper: 0.8, effort: 60, velocity: 12}
      - suffix: thigh_joint
        type: revolute
        origin: {xyz: "0 0.06 0", rpy: "0 0 0"}
        axis: {xyz: "0 1 0"}
        limit: {lower: -1.8, upper: 0.6, effort: 60, velocity: 12}
      - suffix: calf_joint
        type: revolute
        origin: {xyz: "0 0 -0.25", rpy: "0 0 0"}
        axis: {xyz: "0 1 0"}
        limit: {lower: -2.3, upper: -0.6, effort: 60, velocity: 12}
  # Repeat for FR, RL, RR with adjusted values
  - prefix: FR
    # ...
  - prefix: RL
    # ...
  - prefix: RR
    # ...
# MJCF-specific (adjust pos for lengths, ctrlrange for torques)
options:
  timestep: 0.001
  gravity: "0 0 -9.81"
